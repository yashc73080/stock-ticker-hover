<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glance</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="header">
    <div class="brand">
      <img class="logo" src="../icons/icon48.png" width="20" height="20" alt="">
      <span class="wordmark">Glance</span>
    </div>
    <label class="toggle" title="Enable extension">
      <input type="checkbox" id="enabled-toggle" checked>
      <span class="toggle-slider"></span>
    </label>
  </header>

  <section class="section">
    <label class="label" for="api-key">Finnhub API Key</label>
    <div class="input-row">
      <input type="password" id="api-key" placeholder="Enter your API key" autocomplete="off">
      <button type="button" id="toggle-key" class="btn-icon" title="Show/hide key">Show</button>
    </div>
    <p class="helper">
      Get a free key at
      <a href="https://finnhub.io/register" target="_blank" rel="noopener">finnhub.io/register</a>
    </p>
    <button type="button" id="save-key" class="btn-primary">Save</button>
    <span id="save-status" class="save-status"></span>
  </section>

  <section class="section section-hint">
    <p class="helper">
      Missed a company? Highlight its name, then right-click <strong>Look up stock ticker</strong>.
    </p>
  </section>

  <section class="section">
    <span class="label">Open quotes in</span>
    <div class="platform-pills" id="platform-pills">
      <button type="button" class="pill active" data-platform="yahoo">Yahoo</button>
      <button type="button" class="pill" data-platform="robinhood">Robinhood</button>
      <button type="button" class="pill" data-platform="fidelity">Fidelity</button>
      <button type="button" class="pill" data-platform="schwab">Schwab</button>
      <button type="button" class="pill" data-platform="etrade">E*TRADE</button>
      <button type="button" class="pill" data-platform="sofi">SoFi</button>
      <button type="button" class="pill" data-platform="webull">Webull</button>
      <button type="button" class="pill" data-platform="tradingview">TradingView</button>
      <button type="button" class="pill" data-platform="cnbc">CNBC</button>
      <button type="button" class="pill" data-platform="marketwatch">MarketWatch</button>
    </div>
  </section>

  <footer class="footer">
    <span id="version">v1.0.0</span>
    <a href="https://github.com/yashc73080/stock-ticker-hover/issues" target="_blank" rel="noopener">Report an issue</a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
